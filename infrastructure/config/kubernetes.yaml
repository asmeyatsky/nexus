apiVersion: v1
kind: Secret
metadata:
  name: nexus-crm-secrets
  namespace: production
type: Opaque
data:
  # Base64-encoded values — replace with actual secrets
  database-url: CHANGEME
  jwt-secret-key: CHANGEME
  redis-url: CHANGEME
  sendgrid-api-key: CHANGEME
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-crm
  namespace: production
  labels:
    app: nexus-crm
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nexus-crm
  template:
    metadata:
      labels:
        app: nexus-crm
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: nexus-crm
        image: gcr.io/PROJECT_ID/nexus-crm:latest
        ports:
        - containerPort: 8000
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: nexus-crm-secrets
              key: database-url
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: nexus-crm-secrets
              key: jwt-secret-key
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: nexus-crm-secrets
              key: redis-url
        - name: ENVIRONMENT
          value: "production"
        - name: GCP_PROJECT_ID
          value: PROJECT_ID
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: nexus-crm-service
  namespace: production
spec:
  selector:
    app: nexus-crm
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexus-crm-ingress
  namespace: production
  annotations:
    kubernetes.io/ingress.class: "gce"
    networking.gke.io/managed-certificates: "nexus-crm-cert"
    kubernetes.io/ingress.global-static-ip-name: "nexus-crm-ip"
    cloud.google.com/armor-security-policy: "nexus-waf-policy"
spec:
  defaultBackend:
    service:
      name: nexus-crm-service
      port:
        number: 80
  rules:
  - host: api.nexus-crm.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nexus-crm-service
            port:
              number: 80
  tls:
  - hosts:
    - api.nexus-crm.example.com
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nexus-crm-network-policy
  namespace: production
spec:
  podSelector:
    matchLabels:
      app: nexus-crm
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8000
  egress:
  - to: []
    ports:
    - protocol: TCP
      port: 5432
    - protocol: TCP
      port: 6379
    - protocol: TCP
      port: 443
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nexus-crm-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nexus-crm
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
