apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-crm
  namespace: production
  labels:
    app: nexus-crm
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nexus-crm
  template:
    metadata:
      labels:
        app: nexus-crm
    spec:
      containers:
      - name: nexus-crm
        image: gcr.io/PROJECT_ID/nexus-crm:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: nexus-crm-secrets
              key: database-url
        - name: GCP_PROJECT
          value: PROJECT_ID
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: nexus-crm-service
  namespace: production
spec:
  selector:
    app: nexus-crm
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nexus-crm-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nexus-crm
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
